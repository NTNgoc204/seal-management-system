name: Mobile CI

on:
  # Run CI on PRs that touch mobile code or this workflow
  pull_request:
    branches: [main, dev]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

  # Run CI on pushes to main/dev when mobile changed
  push:
    branches: [main, dev]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

  # Allow manual runs from Actions tab
  workflow_dispatch:

# Minimal permissions needed for this workflow
permissions:
  contents: read

# Opt in JavaScript-based actions to Node.js 24 runtime on GitHub runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel older runs on same branch to avoid duplicate pipelines
concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-ci:
    name: Mobile CI (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      # Checkout repository source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install dependencies (prefer npm ci when lockfile exists)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Verify Expo setup
      - name: Verify Expo installation
        run: npx expo --version