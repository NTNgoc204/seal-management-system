name: Frontend CI

on:
  # Run CI on PRs that touch frontend code or this workflow
  pull_request:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Run CI on pushes to main/develop when frontend changed
  push:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Allow manual runs from Actions tab
  workflow_dispatch:

# Minimal permissions for CI only
permissions:
  contents: read

# Cancel older runs on same branch to avoid duplicate pipelines
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      # Checkout repository source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # CD is disabled for now, so no Pages setup is required here.
      # Re-enable below block when you deploy frontend to GitHub Pages.
      #
      # - name: Configure GitHub Pages
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   uses: actions/configure-pages@v5

      # Install dependencies (prefer npm ci when lockfile exists)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Lint to fail fast on style/code-quality issues
      - name: Lint source code
        run: npm run lint

      # Build production bundle into dist/
      - name: Build frontend
        run: npm run build

      # CD is disabled for now, so artifact upload is skipped.
      # Re-enable below block when frontend deploy starts.
      #
      # - name: Upload build artifact for GitHub Pages
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: client/dist

  # CD is intentionally disabled for now because deploy is not ready yet.
  # Uncomment this job later when you deploy frontend to GitHub Pages.
  #
  # frontend-cd:
  #   name: Frontend CD (GitHub Pages)
  #   needs: frontend-ci
  #   runs-on: ubuntu-latest
  #   # Deploy only on pushes to main
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   environment:
  #     name: github-pages
  #     url: ${{ steps.deployment.outputs.page_url }}
  #
  #   steps:
  #     # Deploy uploaded artifact to GitHub Pages
  #     - name: Deploy to GitHub Pages
  #       id: deployment
