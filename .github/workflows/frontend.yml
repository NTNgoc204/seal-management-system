name: Frontend CI/CD

on:
  # Run CI on PRs that touch frontend code or this workflow
  pull_request:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Run CI on pushes to main/develop when frontend changed
  push:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Allow manual runs from Actions tab
  workflow_dispatch:

# Minimal permissions needed for this workflow
permissions:
  contents: read

# Opt in JavaScript-based actions to Node.js 24 runtime on GitHub runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel older runs on same branch to avoid duplicate pipelines
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      # Checkout repository source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install dependencies (prefer npm ci when lockfile exists)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Lint to fail fast on style/code-quality issues
      - name: Lint source code
        run: npm run lint

      # Build production bundle into dist/
      - name: Build frontend
        run: npm run build

  frontend-cd:
    name: Frontend CD (Vercel Deploy Hook)
    needs: frontend-ci
    runs-on: ubuntu-latest
    # Deploy when:
    # 1) code is merged/pushed to main, OR
    # 2) workflow is started manually from Actions tab
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      # Trigger deploy via Vercel Deploy Hook (stored in GitHub Secrets)
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            echo "Create it at: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          curl --fail --show-error -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered."

      # Health check is disabled to keep CD fast.
      # Re-enable this block later if you want post-deploy verification.
