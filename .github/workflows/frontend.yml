name: Frontend CI/CD

on:
  # Run CI on PRs that touch frontend code or this workflow
  pull_request:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Run CI/CD on pushes to main/develop when frontend changed
  push:
    branches: [main, develop]
    paths:
      - "client/**"
      - ".github/workflows/frontend.yml"

  # Allow manual runs from Actions tab
  workflow_dispatch:

# Permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel older runs on same branch to avoid duplicate pipelines
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      # Checkout repository source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Configure GitHub Pages metadata used by deploy action
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      # Install dependencies (prefer npm ci when lockfile exists)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # Lint to fail fast on style/code-quality issues
      - name: Lint source code
        run: npm run lint

      # Build production bundle into dist/
      - name: Build frontend
        run: npm run build

      # Upload dist/ as artifact for deploy job
      - name: Upload build artifact for GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  frontend-cd:
    name: Frontend CD (GitHub Pages)
    needs: frontend-ci
    runs-on: ubuntu-latest
    # Deploy only on pushes to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deploy uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
